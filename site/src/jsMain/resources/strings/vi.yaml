profile:
  name: Thanh Tân
  role: Kotlin Developer
  site-source: https://github.com/tozydev/lucid-abyss
  contact:
    email: me@tozydev.id.vn
    github: https://github.com/tozydev
    bluesky: https://bsky.app/profile/tozydev.id.vn
    linkedin: https://www.linkedin.com/in/tozydev/

  skills:
    - Kotlin
    - Java
    - Typescript
    - Spring Boot
    - Ktor
    - Compose Multiplatform
    - PostgreSQL
    - SQLite
    - Git
    - IntelliJ IDEA
    - AI

  experience:
    - title: Freelance Developer
      period: 2023 - 2025
      company: Minecraft Plugin Development
      dot-color: bg-primary
      description: >
        Phát triển và bảo trì hơn 10 plugins tùy chỉnh cho các máy chủ có lượng người chơi đồng thời từ 50-100.
        Refactor code, tối ưu hiệu năng, xử lý các tác vụ nặng bằng bất đồng bộ giúp duy trì server ổn định ở mức 20 TPS.

  projects:
    - title: lucid-abyss
      description: >
        Website cá nhân được xây dựng hoàn toàn bằng Kotlin thông qua framework Kobweb và Compose HTML.
        Dự án tận dụng sức mạnh của Tailwind CSS v4 để tối ưu giao diện,
        hỗ trợ Static Site Generation từ các tệp Markdown giúp tối ưu hóa tốc độ tải trang và SEO
      tags: [ "Kotlin", "Kobweb", "Compose HTML", "Tailwind CSS" ]
      link: https://github.com/tozydev/lucid-abyss

